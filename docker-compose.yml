services:
  idle-proxy:
    #image: ghcr.io/refolded/vigil:latest
    # Or build locally:
    build: .
    container_name: idleproxy
    ports:
      - "8474:8474"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - proxy-data:/data # persists proxy configs across restarts
    environment:
      STARTUP_TIMEOUT: "120" # max seconds to wait for a container to become ready
    restart: unless-stopped

volumes:
  proxy-data:
